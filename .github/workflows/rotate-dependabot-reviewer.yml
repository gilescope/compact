name: Rotate Dependabot Reviewer

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  assign-reviewer:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: false

      - name: Assign rotating reviewer
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');

            // --- Load reviewer pool (one handle per line, # for comments) ---
            // default rotation reading from the dependabot-reviewers.txt:
            // W17 pataei, dybvig
            // W18 dybvig, kmillikin
            // W19 kmillikin, JosephDenman
            // W20 JosephDenman, pataei
            // W21 pataei, dybvig
            // ...
            const reviewers = fs.readFileSync('.github/dependabot-reviewers.txt', 'utf8')
              .split('\n')
              .map(l => l.replace(/#.*$/, '').trim())
              .filter(Boolean);

            if (reviewers.length < 2) {
              throw new Error('Need at least 2 active reviewers.');
            }

            // --- Load weekly overrides (may not exist) ---
            // any override to the schedule (either skip or trade) is included in this file and merged to main
            // for a swap: add two entries, e.g., pataei <-> dybvig swap of W12 and W15
            // for a skip: add a single entry, e.g., pataei skip of W10
            // the weeks are ISO weeks which can be seen by enabling "Show week numbers" in a google calendar
            let overrides = {};
            try {
              overrides = JSON.parse(
                fs.readFileSync('.github/dependabot-reviewer-overrides.json', 'utf8')
              );
            } catch (e) {
              if (e.code !== 'ENOENT') throw e;
            }

            // --- ISO week key, e.g. "2026-W17" ---
            const now = new Date();
            const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum); // nearest Thursday
            // Use d (post-Thursday-shift) for the year, not `now` — ISO week-numbering
            // year can differ from calendar year near Jan 1 / Dec 31.
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNum = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
            const weekKey = `${d.getUTCFullYear()}-W${String(weekNum).padStart(2, '0')}`;

            // --- Pick primary/backup ---
            let primary, backup, source;
            const override = overrides[weekKey];
            if (override && override.primary && override.backup) {
              primary = override.primary;
              backup  = override.backup;
              source  = `override (${override.note || 'no note'})`;
            } else {
              // Rotate across a stable epoch so the cycle doesn't reset each year.
              const epoch = new Date(Date.UTC(2020, 0, 6)); // Monday
              const weeksSinceEpoch = Math.floor((d - epoch) / (7 * 86400000));
              primary = reviewers[weeksSinceEpoch % reviewers.length];
              backup  = reviewers[(weeksSinceEpoch + 1) % reviewers.length];
              source  = 'rotation';
            }

            // Don't request a review from the PR author (shouldn't happen for
            // dependabot[bot], but cheap to guard against).
            const author = context.payload.pull_request.user.login;
            const toRequest = [primary, backup].filter(r => r !== author);

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: toRequest,
            });

            core.info(`Week ${weekKey}: primary=${primary}, backup=${backup} (${source})`);
