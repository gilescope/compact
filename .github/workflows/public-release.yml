name: Public release of compact toolchain

on:
  workflow_dispatch:
    inputs:
      internal_version:
        description: 'Internal version (e.g. v1.2.3-rc.1, v1.2.3-alpha.0)'
        required: true
        type: string
      language_version:
        description: 'Language version (e.g. v1.2.3)'
        required: true
        type: string
      branch:
        description: 'Branch to use for release notes'
        required: true
        type: choice
        default: 'release/midnight'
        options:
          - main
          - release/midnight
      docs:
        description: 'Create branch with documentation in midnight-docs'
        required: true
        type: boolean
        default: true
      docs_branch:
        description: 'Branch to merge with in midnight-docs'
        required: true
        type: string
        default: 'main'
      pr_description:
        description: 'PR description for docs'
        required: true
        type: string
        default: 'Compact toolchain docs copied to midnight-docs'
      create_release_notes:
        description: 'Create branch for release notes in midnight-docs'
        required: true
        type: boolean
        default: true
      release_notes_branch:
        description: 'Branch to merge with in midnight-docs'
        required: true
        type: string
        default: 'main'
      release_notes_pr_description:
        description: 'PR description for release notes'
        required: true
        type: string
        default: 'Compact toolchain release notes copied to midnight-docs'

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup the variables
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set_branch.outputs.branch }}
      public_version: ${{ steps.public_version.outputs.version }}
      release_notes_file: ${{ steps.release_notes.outputs.file }}
    steps:
      - name: Determine branch
        id: set_branch
        run: |
          BRANCH="${{ inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="main"
          fi
          echo "Using branch: $BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Check format of internal release
        run: |
          INTERNAL="${{ inputs.internal_version }}"
          if [[ ! "$INTERNAL" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|alpha|beta)\.[0-9]+$ ]]; then
            echo "::error::internal_version must match v*.*.*-(rc|alpha|beta).* format (e.g. v1.2.3-rc.1), got: $INTERNAL"
            exit 1
          fi
          echo "Internal version format is valid: $INTERNAL"

      - name: Check format of language version
        run: |
          LANGUAGE="${{ inputs.language_version }}"
          if [[ ! "$LANGUAGE" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::language_version must match v*.*.* format (e.g. v1.2.3), got: $LANGUAGE"
            exit 1
          fi
          echo "Language version format is valid: $LANGUAGE"

      - name: Compute public version
        id: public_version
        run: |
          INTERNAL="${{ inputs.internal_version }}"
          # Validate format
          if [[ ! "$INTERNAL" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "::error::internal_version must match v*.*.*-* format (e.g. v1.2.3-rc.1), got: $INTERNAL"
            exit 1
          fi
          # Strip everything after the first hyphen: v1.2.3-rc.1 -> v1.2.3
          PUBLIC=$(echo "$INTERNAL" | sed 's/-.*//')
          echo "Internal version: $INTERNAL"
          echo "Public version: $PUBLIC"
          echo "version=$PUBLIC" >> "$GITHUB_OUTPUT"

      - name: Compute release notes path
        id: release_notes
        run: |
          VERSION="${{ steps.public_version.outputs.version }}"
          # Strip leading 'v' if present
          CLEAN_VERSION="${VERSION#v}"
          echo "file=doc/release-notes/toolchain-${CLEAN_VERSION}.md" >> "$GITHUB_OUTPUT"

  check-release-notes-exist:
    name: Check if release notes file exists
    runs-on: ubuntu-latest
    needs: [ setup ]
    steps:
      - name: Checkout compactc repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.branch }}

      - name: Verify release notes file exists
        run: |
          if [ ! -f "${{ needs.setup.outputs.release_notes_file }}" ]; then
            echo "::error::Release notes file '${{ needs.setup.outputs.release_notes_file }}' not found on branch '${{ needs.setup.outputs.branch }}'"
            exit 1
          fi
          echo "Release notes file found: ${{ needs.setup.outputs.release_notes_file }}"

  check-docs:
    name: Check if documentation is updated
    if: ${{ inputs.docs }}
    needs: [ setup ]
    uses: ./.github/workflows/check-docs.yml
    secrets: inherit
    with:
      branch: ${{ needs.setup.outputs.branch }}

  check-internal-release-exists:
    name: Check if the internal release exists
    runs-on: ubuntu-latest
    steps:
      - name: Verify internal release exists in artifacts repo
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
        run: |
          INTERNAL_TAG="compactc-${{ inputs.internal_version }}"
          if ! gh release view "$INTERNAL_TAG" --repo midnight-ntwrk/artifacts > /dev/null 2>&1; then
            echo "::error::Internal release '$INTERNAL_TAG' not found in midnight-ntwrk/artifacts"
            exit 1
          fi
          echo "Found internal release: $INTERNAL_TAG"

      - name: Verify all architecture assets exist in internal release
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
        run: |
          INTERNAL_TAG="compactc-${{ inputs.internal_version }}"

          EXPECTED_ARCHS=(
            "aarch64-unknown-linux-musl"
            "x86_64-unknown-linux-musl"
            "aarch64-darwin"
            "x86_64-darwin"
          )

          ASSETS=$(gh release view "$INTERNAL_TAG" --repo midnight-ntwrk/artifacts --json assets --jq '.assets[].name')

          if [ -z "$ASSETS" ]; then
            echo "::error::No assets found in internal release '$INTERNAL_TAG'"
            exit 1
          fi

          echo "Assets found in release:"
          echo "$ASSETS"
          echo ""

          MISSING=0
          for ARCH in "${EXPECTED_ARCHS[@]}"; do
            if ! echo "$ASSETS" | grep -q "$ARCH"; then
              echo "::error::No asset found containing architecture '$ARCH' in release '$INTERNAL_TAG'"
              MISSING=1
            else
              echo "Found asset for architecture: $ARCH"
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "::error::One or more architecture assets are missing from the internal release."
            exit 1
          fi

          echo "All expected architecture assets are present."

  make-internal-release-public:
    name: Copy internal release to public repo
    runs-on: ubuntu-latest
    needs: [ setup, check-internal-release-exists, check-release-notes-exist ]
    steps:
      - name: Checkout compactc repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.branch }}

      - name: Download assets from internal release
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
        run: |
          INTERNAL_TAG="compactc-${{ inputs.internal_version }}"
          mkdir -p assets
          gh release download "$INTERNAL_TAG" --repo midnight-ntwrk/artifacts --dir assets
          echo "Downloaded assets:"
          ls -la assets/

      - name: Rename assets to public version
        run: |
          INTERNAL="${{ inputs.internal_version }}"
          PUBLIC="${{ needs.setup.outputs.public_version }}"
          mkdir -p public-assets
          for file in assets/*; do
            FILENAME=$(basename "$file")
            NEW_FILENAME=$(echo "$FILENAME" | sed "s/${INTERNAL}/${PUBLIC}/g")
            cp "$file" "public-assets/$NEW_FILENAME"
            echo "Renamed: $FILENAME -> $NEW_FILENAME"
          done
          echo "Public assets:"
          ls -la public-assets/

      - name: Create and push tag
        run: |
          git tag ${{ needs.setup.outputs.public_version }}
          git push origin ${{ needs.setup.outputs.public_version }}

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
        run: |
          PUBLIC_VERSION="${{ needs.setup.outputs.public_version }}"
          CLEAN_PUBLIC="${PUBLIC_VERSION#v}"
          PUBLIC_TAG="compactc-${PUBLIC_VERSION}"
          LANGUAGE_VERSION="${{ inputs.language_version }}"
          CLEAN_LANGUAGE="${LANGUAGE_VERSION#v}"
          gh release create "$PUBLIC_TAG" \
            --repo midnightntwrk/compact \
            --title "Compact toolchain ${CLEAN_PUBLIC} (Compact language ${CLEAN_LANGUAGE})" \
            --notes-file "${{ needs.setup.outputs.release_notes_file }}" \
            --latest=false \
            public-assets/*

  generate-docs-after-release:
    if: ${{ inputs.docs }}
    name: Create branch in midnight-docs with latest documentation
    needs: [ setup, check-docs, make-internal-release-public ]
    uses: ./.github/workflows/generate-docs.yml
    secrets: inherit
    with:
      branch: ${{ needs.setup.outputs.branch }}
      docs_branch: ${{ inputs.docs_branch }}
      pr_description: ${{ inputs.pr_description }}
      draft_pr: false

  copy-release-notes-to-midnight-docs:
    if: ${{ inputs.create_release_notes }}
    name: Create branch in midnight-docs for release notes
    needs: [ setup, check-release-notes-exist, make-internal-release-public ]
    uses: ./.github/workflows/compute-release-notes.yml
    secrets: inherit
    with:
      release_notes_file: ${{ needs.setup.outputs.release_notes_file }}
      branch: ${{ needs.setup.outputs.branch }}
      toolchain_version: ${{ needs.setup.outputs.public_version }}
      language_version: ${{ inputs.language_version }}
      release_notes_branch: ${{ inputs.release_notes_branch }}
      release_notes_pr_description: ${{ inputs.release_notes_pr_description }}
