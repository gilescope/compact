name: VSC Plugin Build

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout compactc repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          cd ./editor-support/vsc/compact
          yarn install --frozen-lockfile 

      - name: Build plugin
        run: |
          cd ./editor-support/vsc/compact
          yarn package

      - name: Run tests
        run: |
          cd ./editor-support/vsc/compact
          export TEST_COMPACT_PATH=../../../test-center/compact/test.compact
          yarn compile
          yarn test

      - name: Publish Test Report
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2.6.0
        if: always()
        with:
          name: Plugin JEST Tests Report
          path: |
            !(node_modules)/**/reports/test-report.xml
          reporter: jest-junit

      - name: Publish Test Summary
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          check_name: Plugin Test Results
          files: |
            **/reports/test-report.xml
            !(node_modules)/**/test-report.xml

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Coverage Report
          path: ./editor-support/vsc/compact/coverage
